<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Budget Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: sticky; top: 0; background: #f8f9fa; padding: 10px 0; z-index: 10; border-bottom: 1px solid #ddd; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .card.excluded { opacity: 0.5; background: #f1f1f1; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .component-name { font-weight: bold; border: none; border-bottom: 1px dashed #ccc; font-size: 1.1rem; flex-grow: 1; outline: none; background: transparent; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .dimension-group { display: flex; flex-direction: column; gap: 5px; }
        .unit-inputs { display: flex; gap: 8px; }
        .input-box { display: flex; flex-direction: column; flex: 1; }
        .unit-label { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        label.section-label { font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 5px; }
        input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        input[type="number"].input-error { border-color: #dc3545; background: #fff5f5; }
        .field-warning { font-size: 0.72rem; color: #dc3545; margin-top: 3px; display: none; }
        .field-warning.visible { display: block; }
        .rate-section { border-top: 1px solid #eee; padding-top: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .result-summary { text-align: right; }
        .item-area { font-size: 0.85rem; color: #666; }
        .item-cost { font-weight: bold; color: #28a745; font-size: 1.2rem; }
        .btn-add { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
        .totals-container { position: sticky; bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        .total-box { background: #343a40; color: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .total-box.cost { background: #1e7e34; }
        .total-val { display: block; font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
        .total-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; }
        .include-check { transform: scale(1.3); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Interior Planner</h2>
        <button class="btn-add" onclick="addComponent()">+ Add Item</button>
    </div>

    <div id="component-list"></div>

    <div class="totals-container">
        <div class="total-box">
            <span class="total-label">Total Area</span>
            <span class="total-val"><span id="grand-area">0.00</span> <small>sq.ft</small></span>
        </div>
        <div class="total-box cost">
            <span class="total-label">Total Cost</span>
            <span class="total-val">₹<span id="grand-cost">0.00</span></span>
        </div>
    </div>
</div>

<script>
    let components = JSON.parse(localStorage.getItem('interiorBudgetData')) || [];

    function save() {
        localStorage.setItem('interiorBudgetData', JSON.stringify(components));
    }

    function addComponent() {
        components.push({
            id: Date.now(),
            name: 'New Item',
            lFt: 0, lIn: 0,
            wFt: 0, wIn: 0,
            rate: 0,
            included: true
        });
        save();
        render();
    }

    // FIX 1 & 2: clamp negatives to 0; clamp inches fields to 0–11
    function sanitize(field, value) {
        const num = parseFloat(value) || 0;
        if (field === 'lIn' || field === 'wIn') {
            return Math.min(11, Math.max(0, num));
        }
        return Math.max(0, num); // FIX 1: reject negatives for all numeric fields
    }

    function updateValue(id, field, value) {
        const item = components.find(c => c.id === id);
        if (field === 'name') {
            item[field] = value;
        } else if (field === 'included') {
            item[field] = value;
            render();
        } else {
            item[field] = sanitize(field, value);

            // FIX 2: Show inline warning if inches value is out of 0–11 range
            if (field === 'lIn' || field === 'wIn') {
                const raw = parseFloat(value) || 0;
                const warningId = field === 'lIn' ? `warn-lIn-${id}` : `warn-wIn-${id}`;
                const inputId   = field === 'lIn' ? `inp-lIn-${id}` : `inp-wIn-${id}`;
                const warnEl  = document.getElementById(warningId);
                const inputEl = document.getElementById(inputId);
                if (raw > 11 || raw < 0) {
                    if (warnEl)  warnEl.classList.add('visible');
                    if (inputEl) inputEl.classList.add('input-error');
                } else {
                    if (warnEl)  warnEl.classList.remove('visible');
                    if (inputEl) inputEl.classList.remove('input-error');
                }
            }
        }

        save();
        calculateTotals();
    }

    function deleteComponent(id) {
        if (confirm("Delete this item?")) {
            components = components.filter(c => c.id !== id);
            save();
            render();
        }
    }

    function calculateTotals() {
        let totalArea = 0;
        let totalCost = 0;

        components.forEach(item => {
            // Core formula (unchanged — was already correct)
            const area = (item.lFt + (item.lIn / 12)) * (item.wFt + (item.wIn / 12));
            const cost = area * item.rate;

            const areaDisp = document.getElementById(`area-${item.id}`);
            const costDisp = document.getElementById(`cost-${item.id}`);
            if (areaDisp) areaDisp.innerText = `${area.toFixed(4)} sq. ft.`;
            if (costDisp) costDisp.innerText = `₹${cost.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            if (item.included) {
                totalArea += area;
                totalCost += cost;
            }
        });

        document.getElementById('grand-area').innerText = totalArea.toFixed(4);
        document.getElementById('grand-cost').innerText = totalCost.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function render() {
        const list = document.getElementById('component-list');
        list.innerHTML = '';

        components.forEach(item => {
            const card = document.createElement('div');
            card.className = `card ${item.included ? '' : 'excluded'}`;
            card.innerHTML = `
                <div class="card-header">
                    <input type="checkbox" class="include-check" ${item.included ? 'checked' : ''} onchange="updateValue(${item.id}, 'included', this.checked)">
                    <input class="component-name" value="${item.name}" onchange="updateValue(${item.id}, 'name', this.value)">
                    <button class="btn-delete" onclick="deleteComponent(${item.id})">×</button>
                </div>

                <div class="input-row">
                    <div class="dimension-group">
                        <label class="section-label">Height</label>
                        <div class="unit-inputs">
                            <div class="input-box">
                                <span class="unit-label">Ft</span>
                                <!-- FIX 1: min="0" blocks negatives at browser level -->
                                <input id="inp-lFt-${item.id}" type="number" min="0" value="${item.lFt}"
                                       onchange="updateValue(${item.id}, 'lFt', this.value)">
                            </div>
                            <div class="input-box">
                                <span class="unit-label">In</span>
                                <!-- FIX 2: min="0" max="11" constrains inches at browser level -->
                                <input id="inp-lIn-${item.id}" type="number" min="0" max="11" value="${item.lIn}"
                                       onchange="updateValue(${item.id}, 'lIn', this.value)">
                                <span class="field-warning" id="warn-lIn-${item.id}">Must be 0–11</span>
                            </div>
                        </div>
                    </div>
                    <div class="dimension-group">
                        <label class="section-label">Width</label>
                        <div class="unit-inputs">
                            <div class="input-box">
                                <span class="unit-label">Ft</span>
                                <input id="inp-wFt-${item.id}" type="number" min="0" value="${item.wFt}"
                                       onchange="updateValue(${item.id}, 'wFt', this.value)">
                            </div>
                            <div class="input-box">
                                <span class="unit-label">In</span>
                                <input id="inp-wIn-${item.id}" type="number" min="0" max="11" value="${item.wIn}"
                                       onchange="updateValue(${item.id}, 'wIn', this.value)">
                                <span class="field-warning" id="warn-wIn-${item.id}">Must be 0–11</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="rate-section">
                    <div class="input-box" style="max-width: 120px;">
                        <label class="section-label">Rate (₹/sq.ft)</label>
                        <!-- FIX 1: min="0" blocks negative rates -->
                        <input type="number" min="0" value="${item.rate}"
                               onchange="updateValue(${item.id}, 'rate', this.value)">
                    </div>
                    <div class="result-summary">
                        <div class="item-area" id="area-${item.id}">0.00 sq. ft.</div>
                        <div class="item-cost" id="cost-${item.id}">₹0.00</div>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });

        calculateTotals();
    }

    render();
</script>

</body>
</html>
